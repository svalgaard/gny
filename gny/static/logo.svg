<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="blade1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="blade2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="guard" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#e040fb"/>
    </linearGradient>
  </defs>

  <!-- Pixel grid background (subtle) -->
  <rect width="64" height="64" fill="#0a0a2e" rx="8"/>

  <!-- Sword 1: top-left to bottom-right -->
  <!-- Blade -->
  <rect x="10" y="8"  width="4" height="4" fill="url(#blade1)"/>
  <rect x="14" y="12" width="4" height="4" fill="url(#blade1)"/>
  <rect x="18" y="16" width="4" height="4" fill="url(#blade1)"/>
  <rect x="22" y="20" width="4" height="4" fill="url(#blade1)"/>
  <rect x="26" y="24" width="4" height="4" fill="url(#blade1)"/>
  <rect x="30" y="28" width="4" height="4" fill="url(#blade1)"/>
  <!-- Guard -->
  <rect x="30" y="32" width="4" height="4" fill="url(#guard)"/>
  <rect x="26" y="32" width="4" height="4" fill="url(#guard)"/>
  <rect x="34" y="32" width="4" height="4" fill="url(#guard)"/>
  <rect x="38" y="32" width="4" height="4" fill="url(#guard)"/>
  <rect x="22" y="32" width="4" height="4" fill="url(#guard)"/>
  <!-- Handle -->
  <rect x="34" y="36" width="4" height="4" fill="#ff6f00"/>
  <rect x="38" y="40" width="4" height="4" fill="#ff6f00"/>
  <rect x="42" y="44" width="4" height="4" fill="#ff6f00"/>
  <!-- Pommel -->
  <rect x="46" y="48" width="4" height="4" fill="#e040fb"/>

  <!-- Sword 2: top-right to bottom-left -->
  <!-- Blade -->
  <rect x="50" y="8"  width="4" height="4" fill="url(#blade2)"/>
  <rect x="46" y="12" width="4" height="4" fill="url(#blade2)"/>
  <rect x="42" y="16" width="4" height="4" fill="url(#blade2)"/>
  <rect x="38" y="20" width="4" height="4" fill="url(#blade2)"/>
  <rect x="34" y="24" width="4" height="4" fill="url(#blade2)"/>
  <rect x="30" y="28" width="4" height="4" fill="url(#blade2)"/>
  <!-- Guard (shared row at y=32, already drawn above adds crossover) -->
  <!-- Handle -->
  <rect x="22" y="36" width="4" height="4" fill="#ff6f00"/>
  <rect x="18" y="40" width="4" height="4" fill="#ff6f00"/>
  <rect x="14" y="44" width="4" height="4" fill="#ff6f00"/>
  <!-- Pommel -->
  <rect x="10" y="48" width="4" height="4" fill="#e040fb"/>

  <!-- Blade tips (bright pixel highlight) -->
  <rect x="10" y="8"  width="4" height="4" fill="#80ffff" opacity="0.7"/>
  <rect x="50" y="8"  width="4" height="4" fill="#80ffff" opacity="0.7"/>

  <!-- Scanline overlay for retro effect -->
  <g opacity="0.08">
    <rect x="0" y="0"  width="64" height="2" fill="#fff"/>
    <rect x="0" y="4"  width="64" height="2" fill="#fff"/>
    <rect x="0" y="8"  width="64" height="2" fill="#fff"/>
    <rect x="0" y="12" width="64" height="2" fill="#fff"/>
    <rect x="0" y="16" width="64" height="2" fill="#fff"/>
    <rect x="0" y="20" width="64" height="2" fill="#fff"/>
    <rect x="0" y="24" width="64" height="2" fill="#fff"/>
    <rect x="0" y="28" width="64" height="2" fill="#fff"/>
    <rect x="0" y="32" width="64" height="2" fill="#fff"/>
    <rect x="0" y="36" width="64" height="2" fill="#fff"/>
    <rect x="0" y="40" width="64" height="2" fill="#fff"/>
    <rect x="0" y="44" width="64" height="2" fill="#fff"/>
    <rect x="0" y="48" width="64" height="2" fill="#fff"/>
    <rect x="0" y="52" width="64" height="2" fill="#fff"/>
    <rect x="0" y="56" width="64" height="2" fill="#fff"/>
    <rect x="0" y="60" width="64" height="2" fill="#fff"/>
  </g>
</svg>
